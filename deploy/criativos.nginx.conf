# Vibe Web — criativos.vinicius.xyz
# Drop into /etc/nginx/sites-available/criativos.conf and symlink to
# sites-enabled. Use `certbot --nginx -d criativos.vinicius.xyz --redirect`
# afterwards to add SSL — certbot will edit this file in place.
#
# Pattern matches existing host configs (e.g. memoria.conf): plain HTTP,
# certbot promotes to HTTPS later. The :80 → :443 redirect is added by
# certbot --redirect.

server {
    listen 80;
    server_name criativos.vinicius.xyz;

    # Increase upload size for /api/v1/assets/upload (default 1M is too low).
    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # SSE /api/v1/generate/stream needs long timeouts + no buffering.
        proxy_buffering off;
        proxy_read_timeout 920s;
        proxy_send_timeout 920s;
    }

    # Health-check endpoint (no logs)
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
