<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../brand/tokens.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  position: relative;
}

.headline {
  position: absolute;
  top: 52px;
  left: 0;
  right: 0;
  text-align: center;
  z-index: 2;
}

.headline h1 {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 50px;
  color: var(--text);
  letter-spacing: -1.5px;
  line-height: 1.1;
}

.headline .count {
  color: var(--accent);
}

.grid {
  position: absolute;
  top: 148px;
  left: 48px;
  right: 48px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 14px;
  height: 700px;
}

.grid-item {
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  border: 1px solid #1e1e1e;
}

.grid-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
  display: block;
}

.grid-item::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.4) 100%);
  pointer-events: none;
}

/* Subtle glow on center items */
.grid-item:nth-child(2) { border-color: rgba(var(--accent-rgb), 0.2); }
.grid-item:nth-child(5) { border-color: rgba(var(--accent-rgb), 0.2); }

.bottom {
  position: absolute;
  bottom: 48px;
  left: 0;
  right: 0;
  text-align: center;
  z-index: 2;
}

.bottom .sub {
  font-size: 22px;
  color: var(--text-muted);
  margin-bottom: 14px;
  font-weight: 400;
}

.bottom .sub strong {
  color: var(--text);
  font-weight: 600;
}

.bottom .cta {
  display: inline-block;
  font-size: 17px;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: 0.04em;
}

.bottom .cta::after {
  content: ' →';
}

/* Corner accents */
.corner { position: absolute; width: 20px; height: 20px; z-index: 3; }
.corner-tl { top: 20px; left: 20px; border-top: 1.5px solid rgba(var(--accent-rgb), 0.35); border-left: 1.5px solid rgba(var(--accent-rgb), 0.35); }
.corner-br { bottom: 20px; right: 20px; border-bottom: 1.5px solid rgba(var(--accent-rgb), 0.2); border-right: 1.5px solid rgba(var(--accent-rgb), 0.2); }
</style>
</head>
<body>

<div class="corner corner-tl"></div>
<div class="corner corner-br"></div>

<div class="headline">
  <h1>I built <span class="count">6 sites</span> last month.</h1>
</div>

<div class="grid">
  <div class="grid-item"><img src="../assets/guima-dark.png" alt="Portfolio site"></div>
  <div class="grid-item"><img src="../assets/site-onearc.png" alt="Real estate site"></div>
  <div class="grid-item"><img src="../assets/site-alytics.png" alt="SaaS site"></div>
  <div class="grid-item"><img src="../assets/site-lunera.png" alt="Fintech site"></div>
  <div class="grid-item"><img src="../assets/site-messageai.png" alt="AI site"></div>
  <div class="grid-item"><img src="../assets/site-dreelio.png" alt="Freelancer site"></div>
</div>

<div class="bottom">
  <p class="sub">Yours could be <strong>next.</strong></p>
  <span class="cta">From €450 · Done in 7 days</span>
</div>

</body>
</html>
