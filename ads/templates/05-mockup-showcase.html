<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../brand/tokens.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  position: relative;
}

/* Ambient glow behind laptop */
body::before {
  content: '';
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -20%);
  width: 700px;
  height: 500px;
  background: radial-gradient(ellipse, rgba(var(--accent-rgb), 0.06) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* Top section */
.top {
  position: absolute;
  top: 52px;
  left: 0;
  right: 0;
  text-align: center;
  z-index: 3;
}

.badge {
  display: inline-block;
  background: rgba(var(--accent-rgb), 0.1);
  border: 1px solid rgba(var(--accent-rgb), 0.25);
  color: var(--accent);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 6px 16px;
  margin-bottom: 20px;
}

.headline {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 48px;
  color: var(--text);
  line-height: 1.1;
  letter-spacing: -1.5px;
}

.headline em {
  font-style: normal;
  color: var(--accent);
}

/* MacBook mockup — real device frame */
.laptop {
  position: absolute;
  top: 218px;
  left: 50%;
  transform: translateX(-50%);
  width: 1020px;
  z-index: 2;
}

.laptop-device {
  width: 100%;
  display: block;
  position: relative;
  z-index: 2;
  pointer-events: none;
  filter: drop-shadow(0 12px 32px rgba(0,0,0,0.5));
}

.laptop-screen {
  position: absolute;
  top: 4.6%;
  left: 10.85%;
  right: 10.87%;
  bottom: 11.59%;
  overflow: hidden;
  border-radius: 8px;
  z-index: 1;
}

.laptop-screen img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
  display: block;
}

/* Bottom info */
.bottom {
  position: absolute;
  bottom: 40px;
  left: 0;
  right: 0;
  text-align: center;
  z-index: 3;
}

.bottom-row {
  display: flex;
  justify-content: center;
  gap: 36px;
  margin-bottom: 16px;
}

.bottom-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 18px;
  color: var(--text-muted);
  font-weight: 500;
}

.bottom-item .icon {
  color: var(--accent);
  font-size: 20px;
}

.bottom-cta {
  font-size: 16px;
  color: var(--accent);
  font-weight: 500;
  letter-spacing: 0.03em;
}
</style>
</head>
<body>

<div class="top">
  <div class="badge">Custom Web Development</div>
  <h1 class="headline">
    Still sending clients<br>
    to your <em>Instagram bio?</em>
  </h1>
</div>

<div class="laptop">
  <div class="laptop-screen">
    <img src="../assets/site-alytics.png" alt="SaaS website">
  </div>
  <img class="laptop-device" src="../assets/macbook-frame.png" alt="">
</div>

<div class="bottom">
  <div class="bottom-row">
    <div class="bottom-item"><span class="icon">&#10003;</span> From €450</div>
    <div class="bottom-item"><span class="icon">&#10003;</span> Ready in 7 days</div>
    <div class="bottom-item"><span class="icon">&#10003;</span> 50+ delivered</div>
  </div>
  <div class="bottom-cta">Message me to get started →</div>
</div>

</body>
</html>
