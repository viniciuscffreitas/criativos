<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../brand/tokens.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: #0a0a0a;
  font-family: 'DM Sans', sans-serif;
  position: relative;
}

/* Hook */
.hook {
  position: absolute;
  top: 36px;
  left: 0;
  right: 0;
  text-align: center;
  z-index: 3;
}

.hook h1 {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 42px;
  color: #ffffff;
  letter-spacing: -1.5px;
}

.hook h1 em { font-style: normal; color: #04d361; }

/* Shared browser chrome */
.bchrome {
  height: 30px;
  min-height: 30px;
  background: #151515;
  border-bottom: 1px solid #2a2a2a;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 6px;
}

.bdot { width: 7px; height: 7px; border-radius: 50%; }

/* ─── BEFORE: small frame, top-left, behind ─── */
.before-wrap {
  position: absolute;
  top: 112px;
  left: 44px;
  z-index: 1;
}

.frame-label {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.frame-label.red { color: #e87070; }
.frame-label.green { color: #04d361; }

.frame-before {
  width: 400px;
  height: 240px;
  background: #111;
  border-radius: 10px;
  border: 1px solid rgba(232,112,112,0.12);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.empty-body {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
}

.empty-text {
  font-size: 17px;
  font-weight: 500;
  color: #888;
}

.empty-sub {
  font-size: 14px;
  font-weight: 500;
  color: #e87070;
}

/* ─── AFTER: MacBook mockup, overlapping, in front ─── */
.after-wrap {
  position: absolute;
  top: 278px;
  left: 160px;
  right: 10px;
  z-index: 2;
}

.after-macbook {
  position: relative;
  width: 100%;
  filter: drop-shadow(-4px -4px 24px rgba(0,0,0,0.5));
}

.after-device {
  width: 100%;
  display: block;
  position: relative;
  z-index: 2;
  pointer-events: none;
}

.after-screen {
  position: absolute;
  top: 4.6%;
  left: 10.85%;
  right: 10.87%;
  bottom: 11.59%;
  overflow: hidden;
  border-radius: 6px;
  z-index: 1;
}

.after-screen img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: left top;
  display: block;
}

/* ─── Bottom stats ─── */
.bottom {
  position: absolute;
  bottom: 32px;
  left: 0;
  right: 0;
  text-align: center;
  z-index: 3;
}

.stats-row {
  display: flex;
  justify-content: center;
  gap: 44px;
  margin-bottom: 14px;
}

.stat-item { text-align: center; }

.stat-val {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 32px;
  color: #ffffff;
  letter-spacing: -0.5px;
}

.stat-val.accent { color: #04d361; }

.stat-lbl {
  font-size: 14px;
  color: #a3a3a3;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-top: 3px;
}

.bottom-cta {
  font-size: 17px;
  font-weight: 500;
  color: #04d361;
}
</style>
</head>
<body>

<!-- Hook -->
<div class="hook">
  <h1>You're losing clients <em>right now.</em></h1>
</div>

<!-- BEFORE — small, behind -->
<div class="before-wrap">
  <div class="frame-before">
    <div class="bchrome">
      <div class="bdot" style="background:#2a2a2a"></div>
      <div class="bdot" style="background:#2a2a2a"></div>
      <div class="bdot" style="background:#2a2a2a"></div>
    </div>
    <div class="empty-body">
      <span class="empty-text">No website yet.</span>
      <span class="empty-sub">Losing clients daily.</span>
    </div>
  </div>
</div>

<!-- AFTER — MacBook mockup, overlapping, in front -->
<div class="after-wrap">
  <div class="after-macbook">
    <div class="after-screen">
      <img src="../assets/guima-dark.png" alt="Portfolio site">
    </div>
    <img class="after-device" src="../assets/macbook-frame.png" alt="">
  </div>
</div>

<!-- Bottom stats -->
<div class="bottom">
  <div class="stats-row">
    <div class="stat-item">
      <div class="stat-val accent">€500</div>
      <div class="stat-lbl">Total cost</div>
    </div>
    <div class="stat-item">
      <div class="stat-val">5 days</div>
      <div class="stat-lbl">To launch</div>
    </div>
    <div class="stat-item">
      <div class="stat-val">3×</div>
      <div class="stat-lbl">More inquiries</div>
    </div>
  </div>
  <div class="bottom-cta">Your turn. Message me →</div>
</div>

</body>
</html>
