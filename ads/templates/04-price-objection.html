<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../brand/tokens.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* Subtle background texture */
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 50% 30%, rgba(var(--accent-rgb), 0.03) 0%, transparent 50%);
  pointer-events: none;
}

.content {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 0 80px;
}

.line1 {
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  font-size: 28px;
  color: var(--text-subtle); /* 5.4:1 on var(--bg) — WCAG AA (large text) ✓ */
  margin-bottom: 20px;
}

.price-old {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 120px;
  color: #333;
  letter-spacing: -4px;
  line-height: 1;
  margin-bottom: 12px;
  position: relative;
  display: inline-block;
}

/* Strikethrough */
.price-old::after {
  content: '';
  position: absolute;
  left: -8px;
  right: -8px;
  top: 52%;
  height: 6px;
  background: #e87070;
  transform: rotate(-3deg);
}

.line2 {
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  font-size: 24px;
  color: var(--text-subtle); /* 5.4:1 — WCAG AA ✓ */
  margin-top: 40px;
  margin-bottom: 16px;
}

.price-new {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 96px;
  color: var(--accent);
  letter-spacing: -3px;
  line-height: 1;
  margin-bottom: 8px;
}

.turnaround {
  font-family: 'DM Sans', sans-serif;
  font-size: 24px;
  font-weight: 500;
  color: var(--text);
  margin-top: 16px;
  letter-spacing: 0.02em;
}

.cta {
  margin-top: 44px;
  font-size: 18px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.02em;
}

.cta strong {
  color: var(--accent);
  font-weight: 600;
}

/* Thin accent lines */
.line-top {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--accent) 50%, transparent);
  opacity: 0.3;
}

.line-bottom {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--accent) 50%, transparent);
  opacity: 0.3;
}
</style>
</head>
<body>

<div class="line-top"></div>
<div class="line-bottom"></div>

<div class="content">
  <div class="line1">They quoted you</div>
  <div class="price-old">€3,000</div>

  <div class="line2">I charge</div>
  <div class="price-new">€450.</div>
  <div class="turnaround">Done in 7 days.</div>

  <div class="cta">Stop overthinking. <strong>Message me.</strong></div>
</div>

</body>
</html>
