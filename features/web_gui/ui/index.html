<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <title>Criativos — Vibe Web</title>
  <link rel="icon" href="/brand/logos/vibeweb-icon.svg" type="image/svg+xml"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Fraunces:wght@500;600;700&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/brand/tokens.css"/>
  <style>
    /* Reset + viewport-filling app shell. The app no longer simulates a
       desktop window; it fills the viewport directly. */
    html, body, #root {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #fafaf9;
      font-family: "Geist", "Inter", system-ui, sans-serif;
    }
    /* Hide scrollbars globally — content remains scrollable, the scrollbar
       chrome itself is invisible. Per user request: "scroll 100% invisivel
       em todas as telas". */
    * { scrollbar-width: none; }
    *::-webkit-scrollbar { display: none; width: 0; height: 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
