<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: #0d0d0d;
  font-family: 'DM Sans', sans-serif;
  position: relative;
}

/* Noise texture overlay */
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1;
}

/* Subtle gradient overlay */
body::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 80% 20%, rgba(4,211,97,0.05) 0%, transparent 60%),
              radial-gradient(ellipse at 20% 80%, rgba(4,211,97,0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 1;
}

/* Ghost VW mark background */
.bg-mark {
  position: absolute;
  right: -80px;
  bottom: 80px;
  width: 640px;
  height: 512px;
  opacity: 0.055;
  z-index: 0;
}

/* Corner bracket TL */
.corner-tl {
  position: absolute;
  top: 48px;
  left: 48px;
  width: 36px;
  height: 36px;
  border-top: 2px solid #04d361;
  border-left: 2px solid #04d361;
  z-index: 3;
}

/* Corner bracket BR */
.corner-br {
  position: absolute;
  bottom: 112px;
  right: 48px;
  width: 36px;
  height: 36px;
  border-bottom: 2px solid rgba(4,211,97,0.4);
  border-right: 2px solid rgba(4,211,97,0.4);
  z-index: 3;
}

/* Header bar */
.header {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 88px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 48px;
  z-index: 4;
}

.logo-wrap {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-mark {
  width: 44px;
  height: 35px;
}

.logo-separator {
  width: 1px;
  height: 28px;
  background: #2a2a2a;
}

.logo-text {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 22px;
  color: #ffffff;
  letter-spacing: -0.3px;
}

.tag {
  background: rgba(4,211,97,0.12);
  border: 1px solid rgba(4,211,97,0.3);
  color: #04d361;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 13px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 6px 14px;
  border-radius: 2px;
}

/* Main content */
.content {
  position: absolute;
  top: 130px;
  left: 64px;
  right: 64px;
  z-index: 4;
}

.eyebrow {
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 14px;
  color: #04d361;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 28px;
}

.headline {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 88px;
  color: #ffffff;
  line-height: 1.0;
  letter-spacing: -3px;
  margin-bottom: 40px;
}

.headline em {
  font-style: normal;
  color: #04d361;
}

.accent-line {
  width: 64px;
  height: 3px;
  background: #04d361;
  margin-bottom: 32px;
}

.subtitle {
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  font-size: 22px;
  color: #a3a3a3;
  line-height: 1.6;
  max-width: 560px;
}

/* Stats row */
.stats {
  position: absolute;
  bottom: 128px;
  left: 64px;
  right: 64px;
  display: flex;
  gap: 48px;
  z-index: 4;
}

.stat {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.stat-num {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 36px;
  color: #ffffff;
  letter-spacing: -1px;
}

.stat-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: #a3a3a3;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

/* Footer bar */
.footer {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 68px;
  background: #04d361;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 48px;
  z-index: 4;
}

.footer-url {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 16px;
  color: #0d0d0d;
  letter-spacing: 0.02em;
}

.footer-handle {
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 14px;
  color: #0d0d0d; /* solid — rgba(13,13,13,0.65) on #04d361 was ~2.9:1 FAIL; solid = 9.75:1 ✓ */
  letter-spacing: 0.04em;
}
</style>
</head>
<body>

<!-- Ghost mark background -->
<svg class="bg-mark" viewBox="0 0 600 480" xmlns="http://www.w3.org/2000/svg">
  <g fill="#04d361" fill-rule="evenodd">
    <path d="M 0.0,0.0 L 69.6,152.7 L 82.6,144.0 L 82.6,122.2 L 95.7,122.2 L 69.6,248.7 L 60.9,253.1 L 52.2,309.8 L 34.8,344.7 L 47.8,353.5 L 95.7,327.3 L 152.2,318.5 L 208.7,440.7 L 226.1,445.1 L 226.1,475.6 L 369.6,475.6 L 595.7,0.0 L 434.8,0.0 L 300.0,279.3 L 282.6,244.4 L 269.6,244.4 L 269.6,274.9 L 256.5,274.9 L 273.9,148.4 L 221.7,174.5 L 173.9,183.3 L 126.1,61.1 L 113.0,61.1 L 104.3,117.8 L 91.3,117.8 L 56.5,43.6 L 134.8,39.3 L 182.6,122.2 L 182.6,144.0 L 200.0,161.5 L 230.4,152.7 L 160.9,0.0 L 4.3,0.0 Z"/>
    <path d="M 460.9,43.6 L 313.0,353.5 L 300.0,366.5 L 282.6,353.5 L 252.2,279.3 L 226.1,440.7 L 234.8,414.5 L 252.2,432.0 L 343.5,432.0 L 352.2,423.3 L 369.6,366.5 L 534.8,48.0 L 465.2,43.6 Z"/>
    <path d="M 121.7,183.3 L 121.7,213.8 L 113.0,218.2 L 95.7,283.6 L 169.6,266.2 L 200.0,318.5 L 221.7,218.2 L 156.5,235.6 L 134.8,205.1 L 134.8,183.3 L 126.1,183.3 Z"/>
  </g>
</svg>

<!-- Corner accents -->
<div class="corner-tl"></div>
<div class="corner-br"></div>

<!-- Header -->
<header class="header">
  <div class="logo-wrap">
    <svg class="logo-mark" viewBox="0 0 600 480" xmlns="http://www.w3.org/2000/svg">
      <g fill="#04d361" fill-rule="evenodd">
        <path d="M 0.0,0.0 L 69.6,152.7 L 82.6,144.0 L 82.6,122.2 L 95.7,122.2 L 69.6,248.7 L 60.9,253.1 L 52.2,309.8 L 34.8,344.7 L 47.8,353.5 L 95.7,327.3 L 152.2,318.5 L 208.7,440.7 L 226.1,445.1 L 226.1,475.6 L 369.6,475.6 L 595.7,0.0 L 434.8,0.0 L 300.0,279.3 L 282.6,244.4 L 269.6,244.4 L 269.6,274.9 L 256.5,274.9 L 273.9,148.4 L 221.7,174.5 L 173.9,183.3 L 126.1,61.1 L 113.0,61.1 L 104.3,117.8 L 91.3,117.8 L 56.5,43.6 L 134.8,39.3 L 182.6,122.2 L 182.6,144.0 L 200.0,161.5 L 230.4,152.7 L 160.9,0.0 L 4.3,0.0 Z"/>
        <path d="M 460.9,43.6 L 313.0,353.5 L 300.0,366.5 L 282.6,353.5 L 252.2,279.3 L 226.1,440.7 L 234.8,414.5 L 252.2,432.0 L 343.5,432.0 L 352.2,423.3 L 369.6,366.5 L 534.8,48.0 L 465.2,43.6 Z"/>
        <path d="M 121.7,183.3 L 121.7,213.8 L 113.0,218.2 L 95.7,283.6 L 169.6,266.2 L 200.0,318.5 L 221.7,218.2 L 156.5,235.6 L 134.8,205.1 L 134.8,183.3 L 126.1,183.3 Z"/>
      </g>
    </svg>
    <div class="logo-separator"></div>
    <span class="logo-text">Vibe Web</span>
  </div>
  <div class="tag">Web Development</div>
</header>

<!-- Main content -->
<main class="content">
  <div class="eyebrow">High-impact digital presence</div>
  <h1 class="headline">
    Your site<br>
    that <em>sells.</em>
  </h1>
  <div class="accent-line"></div>
  <p class="subtitle">
    We build modern websites and web systems<br>
    that turn visitors into real clients.
  </p>
</main>

<!-- Stats -->
<div class="stats">
  <div class="stat">
    <span class="stat-num">+50</span>
    <span class="stat-label">Projects delivered</span>
  </div>
  <div class="stat">
    <span class="stat-num">7d</span>
    <span class="stat-label">Avg. turnaround</span>
  </div>
  <div class="stat">
    <span class="stat-num">100%</span>
    <span class="stat-label">Happy clients</span>
  </div>
</div>

<!-- Footer -->
<footer class="footer">
  <span class="footer-url">vibe-web.com</span>
  <span class="footer-handle">@vibeweb.br</span>
</footer>

</body>
</html>
