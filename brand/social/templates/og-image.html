<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1200px;
  height: 630px;
  overflow: hidden;
  background: #0d0d0d;
  position: relative;
  font-family: 'DM Sans', sans-serif;
}

/* Gradient mesh background */
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 15% 50%, rgba(4,211,97,0.07) 0%, transparent 45%),
    radial-gradient(ellipse at 85% 20%, rgba(4,211,97,0.04) 0%, transparent 40%);
  z-index: 0;
  pointer-events: none;
}

/* Ghost mark — right center */
.bg-mark {
  position: absolute;
  right: -40px;
  top: 50%;
  transform: translateY(-50%);
  width: 560px;
  height: 448px;
  opacity: 0.07;
  z-index: 0;
}

/* Top green line */
.top-line {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, #04d361 0%, rgba(4,211,97,0.2) 60%, transparent 100%);
  z-index: 5;
}

/* Bottom footer bar */
.footer {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: #141414;
  border-top: 1px solid #2a2a2a;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 48px;
  z-index: 6;
}

.footer-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.footer-mark {
  width: 28px;
  height: 22px;
}

.footer-url {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 16px;
  color: #a3a3a3;
  letter-spacing: 0.02em;
}

.footer-badge {
  background: rgba(4,211,97,0.1);
  border: 1px solid rgba(4,211,97,0.2);
  color: #04d361;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 13px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 5px 12px;
}

/* Corner brackets */
.corner {
  position: absolute;
  width: 24px;
  height: 24px;
  z-index: 5;
}
.corner-tl { top: 24px; left: 24px; border-top: 1.5px solid rgba(4,211,97,0.5); border-left: 1.5px solid rgba(4,211,97,0.5); }
.corner-tr { top: 24px; right: 24px; border-top: 1.5px solid rgba(4,211,97,0.2); border-right: 1.5px solid rgba(4,211,97,0.2); }

/* Main content */
.content {
  position: absolute;
  left: 64px;
  right: 440px;
  top: 50%;
  transform: translateY(-53%);
  z-index: 6;
}

.eyebrow {
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  font-size: 15px;
  color: #04d361;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 24px;
}

.headline {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 64px;
  color: #ffffff;
  line-height: 1.02;
  letter-spacing: -2.5px;
  margin-bottom: 28px;
}

.headline em {
  font-style: normal;
  color: #04d361;
}

.accent-line {
  width: 48px;
  height: 3px;
  background: #04d361;
  margin-bottom: 24px;
}

.sub {
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  font-size: 18px;
  color: #a3a3a3;
  line-height: 1.6;
}

/* Logo — top left */
.logo-wrap {
  position: absolute;
  top: 38px;
  left: 64px;
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 6;
}

.logo-mark {
  width: 40px;
  height: 32px;
}

.logo-sep {
  width: 1px;
  height: 26px;
  background: #2a2a2a;
}

.logo-name {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 20px;
  color: #ffffff;
  letter-spacing: -0.2px;
}
</style>
</head>
<body>

<div class="top-line"></div>

<!-- Ghost mark -->

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>

<!-- Logo top-left -->
<div class="logo-wrap">
  <svg class="logo-mark" viewBox="0 0 600 480" xmlns="http://www.w3.org/2000/svg">
    <g fill="#04d361" fill-rule="evenodd">
      <path d="M 0.0,0.0 L 69.6,152.7 L 82.6,144.0 L 82.6,122.2 L 95.7,122.2 L 69.6,248.7 L 60.9,253.1 L 52.2,309.8 L 34.8,344.7 L 47.8,353.5 L 95.7,327.3 L 152.2,318.5 L 208.7,440.7 L 226.1,445.1 L 226.1,475.6 L 369.6,475.6 L 595.7,0.0 L 434.8,0.0 L 300.0,279.3 L 282.6,244.4 L 269.6,244.4 L 269.6,274.9 L 256.5,274.9 L 273.9,148.4 L 221.7,174.5 L 173.9,183.3 L 126.1,61.1 L 113.0,61.1 L 104.3,117.8 L 91.3,117.8 L 56.5,43.6 L 134.8,39.3 L 182.6,122.2 L 182.6,144.0 L 200.0,161.5 L 230.4,152.7 L 160.9,0.0 L 4.3,0.0 Z"/>
      <path d="M 460.9,43.6 L 313.0,353.5 L 300.0,366.5 L 282.6,353.5 L 252.2,279.3 L 226.1,440.7 L 234.8,414.5 L 252.2,432.0 L 343.5,432.0 L 352.2,423.3 L 369.6,366.5 L 534.8,48.0 L 465.2,43.6 Z"/>
      <path d="M 121.7,183.3 L 121.7,213.8 L 113.0,218.2 L 95.7,283.6 L 169.6,266.2 L 200.0,318.5 L 221.7,218.2 L 156.5,235.6 L 134.8,205.1 L 134.8,183.3 L 126.1,183.3 Z"/>
    </g>
  </svg>
  <div class="logo-sep"></div>
  <span class="logo-name">Vibe Web</span>
</div>

<!-- Main content -->
<div class="content">
  <div class="eyebrow">Web development agency</div>
  <h1 class="headline">
    We turn your<br>
    idea into<br>
    <em>digital reality.</em>
  </h1>
  <div class="accent-line"></div>
  <p class="sub">Modern sites that turn<br>visitors into clients.</p>
</div>

<!-- Footer -->
<footer class="footer">
  <div class="footer-left">
    <svg class="footer-mark" viewBox="0 0 600 480" xmlns="http://www.w3.org/2000/svg">
      <g fill="#04d361" fill-rule="evenodd">
        <path d="M 0.0,0.0 L 69.6,152.7 L 82.6,144.0 L 82.6,122.2 L 95.7,122.2 L 69.6,248.7 L 60.9,253.1 L 52.2,309.8 L 34.8,344.7 L 47.8,353.5 L 95.7,327.3 L 152.2,318.5 L 208.7,440.7 L 226.1,445.1 L 226.1,475.6 L 369.6,475.6 L 595.7,0.0 L 434.8,0.0 L 300.0,279.3 L 282.6,244.4 L 269.6,244.4 L 269.6,274.9 L 256.5,274.9 L 273.9,148.4 L 221.7,174.5 L 173.9,183.3 L 126.1,61.1 L 113.0,61.1 L 104.3,117.8 L 91.3,117.8 L 56.5,43.6 L 134.8,39.3 L 182.6,122.2 L 182.6,144.0 L 200.0,161.5 L 230.4,152.7 L 160.9,0.0 L 4.3,0.0 Z"/>

        <path d="M 121.7,183.3 L 121.7,213.8 L 113.0,218.2 L 95.7,283.6 L 169.6,266.2 L 200.0,318.5 L 221.7,218.2 L 156.5,235.6 L 134.8,205.1 L 134.8,183.3 L 126.1,183.3 Z"/>
      </g>
    </svg>
    <span class="footer-url">vibe-web.com</span>
  </div>
  <div class="footer-badge">Web Development</div>
</footer>

</body>
</html>
